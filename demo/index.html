<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pretty Color Picker — Demo</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&display=swap"
    />
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: #0c1615;
        font-family: 'Geist', system-ui, sans-serif;
        transition: background 180ms cubic-bezier(0.175, 0.885, 0.32, 1.1);
      }

      @media (prefers-color-scheme: dark) {
        body {
          background: #fff4ed;
        }
      }
    </style>
  </head>
  <body>
    <pretty-color-picker theme="system" header-action="theme" movable></pretty-color-picker>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
