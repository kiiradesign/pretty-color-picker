<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pretty Color Picker - Demo</title>
    <meta
      name="description"
      content="A perceptually accurate OKLCH color picker for the web. Saturation × value plane, format tabs, popover mode, and light / dark themes."
    />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Pretty Color Picker" />
    <meta property="og:title" content="Pretty Color Picker" />
    <meta
      property="og:description"
      content="A perceptually accurate OKLCH color picker for the web. Saturation × value plane, format tabs, popover mode, and light / dark themes."
    />
    <meta property="og:url" content="https://colors.kiira.in/" />
    <meta property="og:image" content="https://colors.kiira.in/pcp-opengraph.png?v=2" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Pretty Color Picker" />
    <meta
      name="twitter:description"
      content="A perceptually accurate OKLCH color picker for the web. Saturation × value plane, format tabs, popover mode, and light / dark themes."
    />
    <meta name="twitter:image" content="https://colors.kiira.in/pcp-opengraph.png?v=2" />
    <link rel="icon" href="/favicon.svg?v=2" type="image/svg+xml" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&display=swap"
    />
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: #0c1615;
        font-family: 'Geist', system-ui, sans-serif;
      }

      @media (prefers-color-scheme: dark) {
        body {
          background: #fff4ed;
        }
      }

      .demo-chrome {
        position: fixed;
        inset: auto 0 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 0 24px;
        font-size: 12px;
        line-height: 1.4;
        --chrome-rgb: 255, 255, 255;
        --chrome-opacity: 0.58;
        --chrome-opacity-hover: 0.88;
        color: rgba(var(--chrome-rgb), var(--chrome-opacity));
        pointer-events: none;
        user-select: none;
        transition: color 0.15s ease;
      }

      .demo-chrome a {
        pointer-events: auto;
        color: inherit;
        text-decoration: underline;
        text-underline-offset: 2px;
        transition: color 0.15s ease;
      }

      .demo-chrome a:hover {
        color: rgba(var(--chrome-rgb), var(--chrome-opacity-hover));
      }

      .demo-hint {
        margin: 0;
      }

      .demo-hint kbd {
        display: inline-block;
        min-width: 1.25em;
        padding: 1px 5px;
        border-radius: 4px;
        border: 1px solid rgba(var(--chrome-rgb), 0.22);
        background: rgba(var(--chrome-rgb), 0.1);
        font-family: inherit;
        font-size: 11px;
        font-weight: 500;
        text-align: center;
        text-transform: uppercase;
        transition:
          border-color 0.15s ease,
          background-color 0.15s ease;
      }

      @media (max-width: 640px) {
        .demo-chrome {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <pretty-color-picker
      id="demo-picker"
      theme="system"
      header-action="none"
      movable
      history="false"
    ></pretty-color-picker>
    <footer class="demo-chrome">
      <p class="demo-hint" aria-live="polite"></p>
      <a
        class="demo-github"
        href="https://github.com/kiiradesign/pretty-color-picker"
        target="_blank"
        rel="noopener noreferrer"
        >View on GitHub</a
      >
    </footer>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
