<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pretty Color Picker</title>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&display=swap"
    />
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: oklch(62% 0.24 303 / 80%);
        font-family: 'Geist', system-ui, sans-serif;
        transition: background 180ms cubic-bezier(0.175, 0.885, 0.32, 1.1);
      }
    </style>
  </head>
  <body>
    <pretty-color-picker
      value="oklch(62% 0.24 303 / 80%)"
      theme="dark"
      header-action="theme"
    ></pretty-color-picker>
    <script type="module" src="/demo/main.ts"></script>
  </body>
</html>
